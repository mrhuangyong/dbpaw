<div class="section">
  <h3>问题</h3>
  <p>ER 按钮应该在什么条件下显示？</p>
</div>

<div class="options">
  <div class="option" data-choice="always" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>始终显示</h3>
      <p>所有表都显示 ER 按钮，即使没有外键关系</p>
    </div>
  </div>
  <div class="option" data-choice="foreign-keys" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>有外键时显示</h3>
      <p>只有检测到外键关系时才显示 ER 按钮</p>
    </div>
  </div>
  <div class="option" data-choice="all-tables" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>始终显示，无外键时提示</h3>
      <p>始终显示按钮，但如果表没有外键，点击后显示提示信息</p>
    </div>
  </div>
</div>
